name: Auto-merge Jules

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only proceed if the PR has the 'automerge' label
    if: contains(github.event.pull_request.labels.*.name, 'automerge')
    steps:
      - name: Enable auto-merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          # Skip draft pull requests
          if [ "${{ github.event.pull_request.draft }}" = "true" ]; then
            echo "PR is a draft — skipping auto-merge."
            exit 0
          fi

          # Enable GitHub's native auto-merge (squash + delete branch)
          # This will wait for all required CI checks to pass before merging.
          gh pr merge "$PR_URL" --auto --squash --delete-branch
