name: Graphify Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: graphify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install graphify
        run: uv tool install graphifyy

      - name: Update knowledge graph
        run: graphify update .

      - name: Commit updated graph
        run: |
          if [ -n "$(git status --porcelain graphify-out/)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add graphify-out/
            git commit -m "chore: auto-update graphify knowledge graph [skip ci]"
            git push
          else
            echo "No changes to graphify-out/ — skipping commit."
          fi
